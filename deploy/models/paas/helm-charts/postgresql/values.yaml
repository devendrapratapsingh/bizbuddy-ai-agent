# PostgreSQL Helm Chart Values
# This chart is based on Bitnami PostgreSQL with customizations for BizBuddy

global:
  postgresql:
    auth:
      username: "bizbuddy"
      password: "bizbuddy"  # ⚠️ Change in production! Use secret
      database: "bizbuddy"
      replicationUsername: "repl"
      replicationPassword: "repl"  # ⚠️ Change in production!
      adminPassword: "admin"  # ⚠️ Change in production!

# Primary (master) configuration
primary:
  # Number of replicas (for HA). Set to 1 for dev, 3 for prod
  replicaCount: 1

  # Persistent storage
  persistence:
    enabled: true
    storageClass: "local-path"
    accessMode: "ReadWriteOnce"
    size: "8Gi"
    # For production, increase to 50-100Gi

  # Resource limits (adjust based on your needs)
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  # Network configuration
  networkPolicy:
    enabled: false  # Set to true in prod with proper network policies
    allowExternal: true  # Allow external connections (for dev)

  # Service configuration
  service:
    type: ClusterIP  # Change to LoadBalancer in prod if needed
    port: 5432
    nodePorts:
      postgresql: ""

  # Configuration files
  configuration:
    postgresql.conf: |
      # Basic configuration
      shared_buffers = 256MB
      effective_cache_size = 1GB
      maintenance_work_mem = 64MB
      max_connections = 100
      # Logging
      log_statement = 'all'
      log_duration = on
      log_min_duration_statement = 1000
      # Performance
      random_page_cost = 1.1
      effective_io_concurrency = 200
      # WAL
      wal_level = replica
      max_wal_senders = 3
      wal_keep_segments = 32

  # Initdb initialization scripts
  initdb:
    scripts:
      # Create additional databases or extensions if needed
      # extensions.sql: |
      #   CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
      #   CREATE EXTENSION IF NOT EXISTS "pgcrypto";

  # Connection configuration
  extraEnvVars:
    - name: POSTGRESQL_SHARED_BUFFERS
      value: "256MB"
    - name: POSTGRESQL_EFFECTIVE_CACHE_SIZE
      value: "1GB"
    - name: POSTGRESQL_MAINTENANCE_WORK_MEM
      value: "64MB"

  # Pod disruption budget (for HA)
  podDisruptionBudget:
    enabled: false  # Set to true in prod
    minAvailable: 1

  # Pod security context
  securityContext:
    enabled: true
    fsGroup: 1001
    runAsUser: 1001

  # Container security context
  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1001

# Read replicas configuration (for HA/performance)
readReplica:
  replicaCount: 0  # Set to 1 or more in prod

  persistence:
    enabled: true
    storageClass: "local-path"
    accessMode: "ReadWriteOnce"
    size: "8Gi"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

# PostgreSQL Archiver (WAL archiving for backups)
archiver:
  enabled: false  # Enable in prod for PITR

# Metrics (Prometheus exporter)
metrics:
  enabled: true
  serviceMonitor:
    enabled: false  # Set to true when Prometheus is installed
    additionalLabels:
      release: prometheus
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# Volume backup configuration (using WAL-G or pgBackRest)
backup:
  enabled: false  # Enable in prod
  cronjob:
    schedule: "0 2 * * *"  # Daily at 2 AM
    retention: 30  # Keep backups for 30 days
    persistence:
      storageClass: "local-path"
      size: "10Gi"

# Sidecar containers (optional)
# sidecars: []

# Node selector and tolerations (for taints)
nodeSelector: {}
tolerations: []
affinity: {}

# Priority class (for pod priority)
priorityClassName: ""

# Custom labels
commonLabels: {}

# Annotations
commonAnnotations: {}

# Image configuration
image:
  registry: docker.io
  repository: bitnami/postgresql
  tag: 15.4.0-debian-11-r41
  pullPolicy: IfNotPresent
  pullSecrets: []

# Init container (for custom initialization)
initContainer:
  enabled: false
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: 15.4.0-debian-11-r41
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# TLS configuration (for SSL connections)
tls:
  enabled: false  # Enable in prod
  certCreator: "auto"
  autoGenerated:
    rootDomain: "example.com"
  existingSecret: ""

---
# Note: For production, consider:
# 1. Enable metrics (Prometheus integration)
# 2. Enable backup (WAL archiving)
# 3. Enable read replicas (for read scaling)
# 4. Enable podDisruptionBudget (for HA)
# 5. Enable networkPolicy (for security)
# 6. Use persistent volume with higher size
# 7. Set resources appropriately for workload
# 8. Use external secrets manager for passwords
# 9. Enable TLS for SSL connections
# 10. Configure replication for HA