apiVersion: v1
kind: Pod
metadata:
  name: {{ include "bizbuddy-frontend.fullname" . }}-test-connection
  labels:
    {{- include "bizbuddy-frontend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.28
      command: ['wget']
      args:
        - '--no-check-certificate'
        - '-q'
        - '--spider'
        - 'http://{{ include "bizbuddy-frontend.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/'
