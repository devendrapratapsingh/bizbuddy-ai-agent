apiVersion: v1
kind: Service
metadata:
  name: {{ include "bizbuddy-frontend.fullname" . }}
  labels:
    {{- include "bizbuddy-frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    {{- include "bizbuddy-frontend.selectorLabels" . | nindent 4 }}
