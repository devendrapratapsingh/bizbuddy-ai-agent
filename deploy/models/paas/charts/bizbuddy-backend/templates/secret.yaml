{{- $secretName := .Values.config.JWT_SECRET | default (include "bizbuddy-backend.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "bizbuddy-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT Secret (REQUIRED - generate strong random string)
  jwt-secret: {{ .Values.config.JWT_SECRET | default "change-me-in-production" | quote }}
  # OpenAI API Key (REQUIRED)
  openai-api-key: {{ .Values.config.OPENAI_API_KEY | default "" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.existingSecret | default (include "bizbuddy-backend.fullname" .) }}
  labels:
    {{- include "bizbuddy-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresql-password: {{ .Values.database.password | default "password" | quote }}
  {{- if .Values.database.username }}
  postgresql-username: {{ .Values.database.username | default "postgres" | quote }}
  {{- end }}
  {{- if .Values.database.database }}
  postgresql-database: {{ .Values.database.database | default "bizbuddy_db" | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.redis.existingSecret | default (printf "%s-redis" (include "bizbuddy-backend.fullname" .)) }}
  labels:
    {{- include "bizbuddy-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-password: {{ .Values.redis.password | default "" | quote }}
