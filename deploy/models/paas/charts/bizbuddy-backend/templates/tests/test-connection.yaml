apiVersion: v1
kind: Pod
metadata:
  name: {{ include "bizbuddy-backend.fullname" . }}-test-connection
  labels:
    {{- include "bizbuddy-backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.28
      command: ['wget']
      args:
        - '--no-check-certificate'
        - '-O'
        - '/dev/stdout'
        - 'http://{{ include "bizbuddy-backend.fullname" . }}:{{ .Values.service.port }}/health'
