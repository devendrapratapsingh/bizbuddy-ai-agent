version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bizbuddy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bizbuddy_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bizbuddy_db}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - bizbuddy-network

  redis:
    image: redis:7-alpine
    container_name: bizbuddy-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - bizbuddy-network

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
    container_name: bizbuddy-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-bizbuddy_db}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SOCKET_IO_SECRET: ${SOCKET_IO_SECRET:-${JWT_SECRET}}
      PORT: 3000
      HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:3000}
      SOCKET_IO_CORS_ORIGIN: ${SOCKET_IO_CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEPLOY_MODEL: iaas
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      DB_POOL_IDLE_TIME: ${DB_POOL_IDLE_TIME:-10000}
      MAX_CONCURRENT_CALLS: ${MAX_CONCURRENT_CALLS:-10}
      CONVERSATION_TIMEOUT: ${CONVERSATION_TIMEOUT:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bizbuddy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bizbuddy-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
