name: Deploy IaaS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-iaas:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --only=production
          cd frontend && npm ci && cd ..

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bizbuddy-backend:${{ github.sha }} -f Dockerfile .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bizbuddy-frontend:${{ github.sha }} -f frontend/Dockerfile frontend/
          docker push ${{ secrets.DOCKER_USERNAME }}/bizbuddy-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bizbuddy-frontend:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/bizbuddy/deploy/models/iaas
            docker-compose pull
            docker-compose up -d
            sleep 10
            curl -f http://localhost:3000/health || exit 1

      - name: Notify success
        if: success()
        run: |
          echo "✅ IaaS deployment successful"
          # Send Slack/Discord notification if webhook configured
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"✅ BizBuddy IaaS deployed successfully (commit ${{ github.sha }})\"}" \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          fi

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ IaaS deployment failed"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ BizBuddy IaaS deployment FAILED (commit ${{ github.sha }})\"}" \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          fi
